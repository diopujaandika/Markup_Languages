<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>List in HTML</title>
        <link rel="stylesheet" href="">
        <style></style>
        <script></script>
        <noscript></noscript>
        <base href="">
    </head>
    <body>
        <!--
        Comment to List
        1. <ol>
        2. <ul>
        3. <dl>
        -->
        <h1>List</h1> <!--Membuat list-->

        <h2>Ordered List</h2>   <!--Ordered List digunakan untuk membuat list terurut, biasanya bentuknya dalam angka-->
        <ol><!--List terurut-->
            <li>Langkah pertama</li>
            <li>Langkah kedua</li>
            <li>Langkah ketiga</li>
            <li>Langkah selanjutnya</li>
        </ol>

        <h2>Unodered List</h2>  <!--Unodered List digunakan untuk membuat list tidak terurut, biasanya bentukan dalam bulletin.-->
        <ul><!--List tidak terurut-->
            <li>List 1</li>
            <li>List 2</li>
            <li>List 3</li>
        </ul>

        <h2>Definition List</h2>    <!--Definition List digunakan untuk membuat list yang diikuti dengan deskirpisi didalamnya.-->
        <dl><!--List yang memiliki deskripsi-->
            <dt>List 1</dt>                         <!--Definition Term adalah Judul List-->
            <dd>Ini adalah deskripsi list 1</dd>    <!--Definition Description adalah Deskripsi List -->
            <dt>List 2</dt>
            <dd>Ini adalah deskripsi list 2</dd>
            <dt>List 3</dt>
            <dd>Ini adalah deskripsi list 3</dd>
        </dl>
    </body>
</html>
